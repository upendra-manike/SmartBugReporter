  <line x1="40" y1="52" x2="68" y2="52" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="62" x2="64" y2="62" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
